name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Lint Python code ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff lint check
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/

  # ── Build bundled Python binaries (arm64 + x64) on one runner ─────────────
  python-binary:
    needs: [lint]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build arm64 binary
        run: |
          python3 -m venv /tmp/venv-arm64
          /tmp/venv-arm64/bin/pip install pyinstaller opencv-python-headless numpy
          /tmp/venv-arm64/bin/python -m PyInstaller --onefile --name stabilizer_arm64 \
            --distpath dist-py \
            --workpath /tmp/pyinstaller-arm64 \
            --specpath /tmp \
            src/stabilizer_cli.py

      - name: Build x64 binary (Rosetta 2)
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 \
            -m venv /tmp/venv-x64
          arch -x86_64 /tmp/venv-x64/bin/pip install pyinstaller opencv-python-headless numpy
          arch -x86_64 /tmp/venv-x64/bin/python -m PyInstaller --onefile --name stabilizer_x64 \
            --distpath dist-py \
            --workpath /tmp/pyinstaller-x64 \
            --specpath /tmp \
            src/stabilizer_cli.py

      - uses: actions/upload-artifact@v4
        with:
          name: stabilizer-binaries
          path: |
            dist-py/stabilizer_arm64
            dist-py/stabilizer_x64

  # ── Build DMGs with both binaries bundled ─────────────────────────────────
  build:
    needs: [python-binary]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Python binaries
        uses: actions/download-artifact@v4
        with:
          name: stabilizer-binaries
          path: dist-py

      - name: Make binaries executable
        run: chmod +x dist-py/stabilizer_arm64 dist-py/stabilizer_x64

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install electron dependencies
        working-directory: electron
        run: npm install

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: electron
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version || true

      # ── Code Signing (when secrets are configured) ──────────────────────────
      - name: Import Developer ID certificate into keychain
        if: env.CSC_CONTENT != ''
        env:
          CSC_CONTENT: ${{ secrets.CSC_CONTENT }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_CONTENT" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" build.keychain
          rm /tmp/certificate.p12

      - name: Build DMGs (arm64 + x64)
        working-directory: electron
        env:
          # Signing env vars - notarize.js and electron-builder use these
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build

      # ── Fallback ad-hoc codesign (when secrets not configured) ──────────────
      - name: Ad-hoc codesign app bundles (fallback)
        if: env.CSC_CONTENT == ''
        env:
          CSC_CONTENT: ${{ secrets.CSC_CONTENT }}
        run: |
          echo "::warning::No signing certificate configured. Using ad-hoc signing (users will need xattr -cr)."
          codesign --force --deep --sign - "dist/mac-arm64/Perforation Stabilizer.app" || true
          codesign --force --deep --sign - "dist/mac/Perforation Stabilizer.app" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Perforation-Stabilizer-macOS-DMGs
          path: dist/*.dmg
          retention-days: 30

      - name: Create GitHub Release and upload DMGs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || gh release upload "${{ github.ref_name }}" dist/*.dmg --clobber
