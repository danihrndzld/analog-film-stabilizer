name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller opencv-python numpy tkinterdnd2

      - name: Build app
        run: |
          pyinstaller \
            --windowed \
            --onedir \
            --collect-all cv2 \
            --collect-all numpy \
            --collect-all tkinterdnd2 \
            --hidden-import=tkinterdnd2 \
            --name "Perforation Stabilizer" \
            src/perforation_stabilizer_app.py

      - name: Zip app
        run: |
          cd dist
          zip -r "Perforation_Stabilizer_macOS.zip" "Perforation Stabilizer.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Perforation-Stabilizer-macOS
          path: dist/Perforation_Stabilizer_macOS.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Perforation_Stabilizer_macOS.zip
