name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build universal2 binary (arm64 + x64 in one fat binary) ───────────────
  python-binary:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps + PyInstaller
        run: pip3 install --break-system-packages pyinstaller opencv-python-headless numpy

      - name: Build universal2 standalone binary
        run: |
          python3 -m PyInstaller --onefile --name stabilizer \
            --target-arch universal2 \
            --distpath dist-py \
            --workpath /tmp/pyinstaller-build \
            --specpath /tmp \
            src/stabilizer_cli.py

      - uses: actions/upload-artifact@v4
        with:
          name: stabilizer-universal
          path: dist-py/stabilizer

  # ── Build DMGs with binary bundled ────────────────────────────────────────
  build:
    needs: [python-binary]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Python binary
        uses: actions/download-artifact@v4
        with:
          name: stabilizer-universal
          path: dist-py

      - name: Make binary executable
        run: chmod +x dist-py/stabilizer

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install electron dependencies
        working-directory: electron
        run: npm install

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: electron
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version

      - name: Build DMGs (arm64 + x64)
        working-directory: electron
        run: npm run build

      - name: Ad-hoc codesign app bundles
        run: |
          codesign --force --deep --sign - "dist/mac-arm64/Perforation Stabilizer.app"
          codesign --force --deep --sign - "dist/mac/Perforation Stabilizer.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Perforation-Stabilizer-macOS-DMGs
          path: dist/*.dmg
          retention-days: 30

      - name: Create GitHub Release and upload DMGs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || gh release upload "${{ github.ref_name }}" dist/*.dmg --clobber
