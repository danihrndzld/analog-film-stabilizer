name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build bundled Python binary for Apple Silicon ──────────────────────────
  python-arm64:
    runs-on: macos-latest   # GitHub's arm64 runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps + PyInstaller
        run: pip3 install --break-system-packages pyinstaller opencv-python-headless numpy

      - name: Build standalone binary (arm64)
        run: |
          python3 -m PyInstaller --onefile --name stabilizer_arm64 \
            --distpath dist-py \
            --workpath /tmp/pyinstaller-arm64 \
            --specpath /tmp \
            src/stabilizer_cli.py

      - uses: actions/upload-artifact@v4
        with:
          name: stabilizer-arm64
          path: dist-py/stabilizer_arm64

  # ── Build bundled Python binary for Intel ─────────────────────────────────
  python-x64:
    runs-on: macos-13       # last GitHub Intel runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps + PyInstaller
        run: pip3 install --break-system-packages pyinstaller opencv-python-headless numpy

      - name: Build standalone binary (x64)
        run: |
          python3 -m PyInstaller --onefile --name stabilizer_x64 \
            --distpath dist-py \
            --workpath /tmp/pyinstaller-x64 \
            --specpath /tmp \
            src/stabilizer_cli.py

      - uses: actions/upload-artifact@v4
        with:
          name: stabilizer-x64
          path: dist-py/stabilizer_x64

  # ── Build DMGs with both binaries bundled ─────────────────────────────────
  build:
    needs: [python-arm64, python-x64]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Python binaries
        uses: actions/download-artifact@v4
        with:
          pattern: stabilizer-*
          path: dist-py
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x dist-py/stabilizer_arm64 dist-py/stabilizer_x64

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install electron dependencies
        working-directory: electron
        run: npm install

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: electron
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version

      - name: Build DMGs (arm64 + x64)
        working-directory: electron
        run: npm run build

      - name: Ad-hoc codesign app bundles
        run: |
          codesign --force --deep --sign - "dist/mac-arm64/Perforation Stabilizer.app"
          codesign --force --deep --sign - "dist/mac/Perforation Stabilizer.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Perforation-Stabilizer-macOS-DMGs
          path: dist/*.dmg
          retention-days: 30

      - name: Create GitHub Release and upload DMGs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            || gh release upload "${{ github.ref_name }}" dist/*.dmg --clobber
